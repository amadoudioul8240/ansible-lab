---
- name: Deploiement du Dashboard Dynamique
  hosts: serveurs
  become: yes
  tasks:
    - name: Installation de Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Generation de la page HTML
      template:
        src: index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'